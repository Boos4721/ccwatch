# ccwatch 默认配置 — agent 会话监控器
#
# 监控 tmux 里的 AI agent CLI 会话(Claude Code / Codex / Gemini / ...),
# 检测状态转移(干完 / 卡住 / 空闲),只在变化时播报。
#
# 状态分类基于 tmux pane 末尾文本的正则匹配。每个 agent 一个 [[profiles]],
# 加新 agent = 加一段 profile,不改代码。
#
# 优先级:working > waiting > idle(先匹配 working,命中即定;依次 waiting、idle;
# 都不中 = unknown,不播报)。

# ---- 全局 ----
[general]
# 监控哪些 tmux 会话:按会话名前缀过滤(空 = 全部会话)
session_prefixes = ["cc", "codex", "gemini", "aider", "cline", "agent", "probe"]
# 抓 pane 末尾多少行做分类
capture_lines = 60
# daemon 模式轮询间隔(秒)
poll_interval_secs = 30
# 状态文件路径(记录上次每个会话的状态,用于检测转移)
state_file = "~/.config/ccwatch/state.json"
# 「卡住」阈值(秒):一个会话处于 working 但 pane 内容(剥掉计时器/spinner 数字后)
# 持续无变化超过此值,即播报一次「疑似卡住」(默认 600 = 10 分钟)
stuck_threshold_secs = 600
# 终端复用器后端:tmux(默认)或 screen(GNU screen)。
# 注意:这与 `--mode screen`(抓屏 vs 协议轨道)是两个维度——backend 指底层用
# tmux 还是 GNU screen 抓屏/发键。
backend = "tmux"

# ---- 投递(daemon 模式自投递;once 模式只打印 stdout 给 Hermes cron) ----
[delivery]
# none = 只打印 stdout(配合 Hermes no_agent cron);telegram = 直连 Bot API
mode = "none"
# telegram 模式需要:
# bot_token = "123456:ABC..."
# chat_id = "7435622194"
# 可选代理(国内访问 telegram 需要)
# proxy = "http://proxy.kto:7890"

# ---- 播报规则:哪些状态转移要播报 ----
[transitions]
# 干完了(working/waiting/unknown → idle)
notify_done = true
# 卡住了(任意 → waiting)
notify_waiting = true
# 开始干(idle/waiting → working)—— 默认不报,免噪音
notify_working = false
# 会话消失
notify_gone = true
# 新会话首次见到且已是 waiting
notify_new_waiting = true
# 疑似卡住(working 持续无变化超过 stuck_threshold_secs)
notify_stuck = true
# 转移触发 hook(可选 shell 命令;注入 CCWATCH_SESSION/CCWATCH_STATE/CCWATCH_CONTEXT)。
# 命令经 sh -c 执行,失败只 warn 不中断主循环。默认不配。仅抓屏轨道触发。
# on_done_cmd    = "notify-send \"$CCWATCH_SESSION done\""
# on_waiting_cmd = "echo \"$CCWATCH_SESSION waiting: $CCWATCH_CONTEXT\" >> ~/ccwatch.log"
# on_working_cmd = ""
# on_stuck_cmd   = "notify-send \"$CCWATCH_SESSION stuck\""

# ==========================================================================
# 自动应答 —— 命中 pane 正则时用 send-keys 自动回应安全弹窗
# 默认全部禁用,必须显式 enabled = true 才生效。慎用:会真的替你按键。
# ==========================================================================
# [[auto_answer]]
# profile = "codex"                  # 限定 profile(可选;省略则任意 profile 都触发)
# match   = "Trust all and continue" # 匹配 pane 的正则
# send    = "Enter"                  # 要发的按键(Enter / 1 / y …)
# enabled = false                    # 默认关

# ==========================================================================
# 跨会话编排 —— 空闲会话自动领取任务队列里的下一条任务
# 默认禁用。用 `ccwatch dispatch` 触发一次派发。慎用:会真的替你发指令。
# ==========================================================================
[orchestration]
enabled = false
# 只把任务投给会话名匹配此正则的 idle 会话(可选;省略则任意 idle 会话)
# session_match = "^cc"
# 内联任务队列(作为初始种子;配了 queue_file 时以文件为准)
# task_queue = ["跑一下测试", "把 README 补一段"]
# 队列文件路径(每行一个任务,出队后改写;支持 ~)
# queue_file = "~/.config/ccwatch/queue.txt"

# ==========================================================================
# Agent Profiles —— 真实 pane 特征(2026-06 实测 claude/codex/gemini 抓取)
# ==========================================================================

# ---- Claude Code ----
# WORKING: 底部状态栏 "esc to interrupt"
# WAITING: "Enter to select" / "❯ 1." 菜单 / "Do you want" / "(y/n)"
# IDLE:    "for agents" 状态栏 + 空 "❯" 提示符,无 interrupt
[[profiles]]
name = "claude"
# 会话名匹配(正则,可选;空则靠 pane 内容嗅探)
session_match = "^cc"
# pane 内容嗅探(用于会话名认不出时,确认这是 claude code)
detect = "bypass permissions|for agents|claude"
working = ["esc to interrupt"]
waiting = [
  "Enter to select",
  "Tab/Arrow keys",
  "Do you want",
  "Would you like",
  "\\(y/n\\)",
  "❯\\s*1\\.",
  "Press Enter to continue",
]
# waiting 子类型(可选;命中即细分播报"在等什么")。优先级 approval > menu > input。
# approval:等 y/n 审批
waiting_approval = ["Do you want", "Would you like", "\\(y/n\\)", "bypass permissions"]
# menu:等方向键/编号菜单选择
waiting_menu = ["Enter to select", "Tab/Arrow keys", "❯\\s*1\\."]
# input:等用户敲文本
waiting_input = ["Press Enter to continue", "type your"]
idle = ["for agents", "(?m)^❯\\s*$", "new task\\? /clear"]

# ---- Codex (OpenAI) ----
# WORKING: "Working (Ns • esc to interrupt)"
# WAITING: "Press enter to confirm" / "› 1." 菜单 / "(Use Enter to select)"
# IDLE:    "› " 输入框 + 底部 "gpt-... · ~/path" 状态行,无 Working
[[profiles]]
name = "codex"
session_match = "^codex"
detect = "OpenAI Codex|gpt-5|/skills to list"
working = ["esc to interrupt", "Working \\(\\d+s"]
waiting = [
  "Press enter to confirm",
  "Use Enter to select",
  "›\\s*1\\.",
  "Trust all and continue",
  "Review hooks",
  "\\(y/n\\)",
]
# waiting 子类型
waiting_approval = ["Trust all and continue", "\\(y/n\\)", "Allow command", "approve"]
waiting_menu = ["Use Enter to select", "›\\s*1\\.", "Press enter to confirm", "Review hooks"]
waiting_input = ["Type a message"]
# codex idle:有输入框 › 提示 + 底部模型状态行,但没有 Working
idle = ["(?m)^›\\s*$", "Use /skills to list", "·\\s*~/"]

# ---- Gemini CLI ----
# 注:实测账号地区不支持登录,只抓到 auth 菜单(WAITING 态)。
# working/idle 规则按 gemini-cli 公开 UI 推测,待实际可登录后校准(TODO)。
[[profiles]]
name = "gemini"
session_match = "^gemini"
detect = "Gemini CLI|Gemini API Key|geminicli"
working = ["esc to interrupt", "esc to cancel"]
waiting = [
  "Use Enter to select",
  "How would you like to authenticate",
  "●\\s*1\\.",
  "\\(Use Enter to select\\)",
]
idle = ["(?m)^>\\s*$", "Type your message", "for shortcuts"]

# ---- Aider ----
# TODO: 推测 profile,未经真实 pane 校准。Aider 是 REPL 式终端 agent。
# WORKING: 跑工具/编辑时底部有 token/cost 行或中断提示(待校准)。
# WAITING: 确认类提问 "(Y)es/(N)o" / commit 确认 / 加文件确认。
# IDLE:    空的 ">" 输入提示符。
[[profiles]]
name = "aider"
session_match = "^aider"
detect = "aider|Aider v|Use /help"
working = ["esc to interrupt", "Tokens:.*Cost:"]
waiting = [
  "\\(Y\\)es/\\(N\\)o",
  "\\(y/n\\)",
  "Add .* to the chat\\?",
  "Apply edits\\?",
]
# waiting 子类型(推测,待校准)
waiting_approval = ["\\(Y\\)es/\\(N\\)o", "\\(y/n\\)", "Apply edits\\?", "Add .* to the chat\\?"]
waiting_input = ["Type a message", "^>\\s"]
idle = ["(?m)^>\\s*$", "Use /help", "for help"]

# ---- Cline (VS Code 扩展,也有 CLI 形态)----
# TODO: 推测 profile,未经真实 pane 校准。
# WORKING: 执行任务时的中断提示。
# WAITING: 批准工具调用 "Approve" / "Reject" 类弹窗。
# IDLE:    等待新任务输入。
[[profiles]]
name = "cline"
session_match = "^cline"
detect = "Cline|cline"
working = ["esc to interrupt", "Executing"]
waiting = [
  "Approve",
  "Reject",
  "Do you want to proceed",
  "\\(y/n\\)",
]
# waiting 子类型(推测,待校准)
waiting_approval = ["Approve", "Reject", "Do you want to proceed", "\\(y/n\\)"]
idle = ["(?m)^>\\s*$", "Type a task"]
